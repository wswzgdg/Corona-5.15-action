name: Build Kernel (All Managers Matrix)

on:
  workflow_dispatch:
    inputs:
      build_sukisu:
        description: "编译 SukiSU"
        required: true
        type: boolean
        default: true
      build_resukisu:
        description: "编译 ReSukiSU"
        required: true
        type: boolean
        default: true
      build_ksunext:
        description: "编译 KSUNext"
        required: true
        type: boolean
        default: true
      build_ksu:
        description: "编译 KSU"
        required: true
        type: boolean
        default: true
      build_kowsu:
        description: "编译 KowSU"
        required: true
        type: boolean
        default: true
      build_none:
        description: "编译 无管理器"
        required: true
        type: boolean
        default: true
      kernel_suffix:
        description: "内核后缀(别加连字符,空为默认)"
        required: false
        type: string
        default: ""
      sukisu_custom:
        description: "SukiSU 自定义版本名(可空)"
        required: false
        type: string
        default: ""
      resukisu_custom:
        description: "ReSukiSU 自定义版本名(可空)"
        required: false
        type: string
        default: ""

jobs:
  build:
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        manager: [resukisu, sukisu, ksunext, ksu, kowsu, none]
    uses: ./.github/workflows/kernel-build.yml
    with:
      manager: ${{ matrix.manager }}
      kernel_suffix: ${{ inputs.kernel_suffix }}
      sukisu_custom: ${{ inputs.sukisu_custom }}
      resukisu_custom: ${{ inputs.resukisu_custom }}
      build_enabled: ${{ (matrix.manager == 'sukisu' && inputs.build_sukisu) || (matrix.manager == 'resukisu' && inputs.build_resukisu) || (matrix.manager == 'ksunext' && inputs.build_ksunext) || (matrix.manager == 'ksu' && inputs.build_ksu) || (matrix.manager == 'kowsu' && inputs.build_kowsu) || (matrix.manager == 'none' && inputs.build_none) }}
      allow_fail: true
    secrets: inherit

  release:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: 下载全部 ZIP 工件
        uses: actions/download-artifact@v8
        with:
          path: ./release_zips
          pattern: ak3-*
          merge-multiple: true

      - name: 下载源码元数据
        uses: actions/download-artifact@v8
        with:
          path: ./source_meta
          pattern: source-meta-*
          merge-multiple: true

      - name: 获取上一版发布元数据
        id: previous_release
        uses: actions/github-script@v8
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('body_b64', Buffer.from(data.body || '', 'utf8').toString('base64'));
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('body_b64', '');
                return;
              }
              throw error;
            }

      - name: 生成发布信息
        id: release_meta
        run: |
          echo "tag=all-managers-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "name=All Managers Build #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: 生成发布描述
        env:
          PREVIOUS_RELEASE_BODY_B64: ${{ steps.previous_release.outputs.body_b64 }}
        run: |
          git init release_meta_repo >/dev/null 2>&1
          cd release_meta_repo
          git remote add origin https://github.com/Corona-oplus-kernel/kernel_common_oplus.git
          git fetch --depth=1 origin android13-5.15-lts
          COMMON_COMMIT=$(git rev-parse FETCH_HEAD)
          cd ..
          rm -rf release_meta_repo
          export COMMON_COMMIT
          python3 - <<'PYBODY'
          import base64
          import json
          import os
          import re
          from pathlib import Path

          def normalize_github_url(url):
              url = url.strip()
              if url.startswith('git@github.com:'):
                  repo = url.split(':', 1)[1]
                  if repo.endswith('.git'):
                      repo = repo[:-4]
                  return f'https://github.com/{repo}'
              if 'github.com/' in url:
                  repo = url.split('github.com/', 1)[1]
                  repo = repo.split('@', 1)[-1]
                  if repo.endswith('.git'):
                      repo = repo[:-4]
                  return f'https://github.com/{repo}'
              return url

          def render_repo_line(repo, previous_repo):
              current_commit = repo.get('commit')
              remote = normalize_github_url(repo.get('remote', ''))
              prev_commit = (previous_repo or {}).get('commit')
              if not current_commit or prev_commit == current_commit:
                  return None
              label = repo.get('label', repo.get('key', 'repo'))
              if remote.startswith('https://github.com/'):
                  if prev_commit:
                      link = f'{remote}/compare/{prev_commit}...{current_commit}'
                      text = f'{prev_commit[:7]}...{current_commit[:7]}'
                  else:
                      link = f'{remote}/commit/{current_commit}'
                      text = current_commit[:7]
                  return f'- {label}: [`{text}`]({link})'
              return f'- {label}: `{current_commit[:7]}`'

          previous_body_b64 = os.environ.get('PREVIOUS_RELEASE_BODY_B64', '')
          previous_body = ''
          if previous_body_b64:
              previous_body = base64.b64decode(previous_body_b64).decode('utf-8')

          previous_meta = {}
          match = re.search(r'<!-- source-meta-begin\n(.*?)\nsource-meta-end -->', previous_body, re.S)
          if match:
              try:
                  previous_meta = json.loads(match.group(1))
              except json.JSONDecodeError:
                  previous_meta = {}

          current_meta = {}
          for path in sorted(Path('source_meta').glob('*.json')):
              data = json.loads(path.read_text())
              current_meta[data['manager']] = data

          shared_meta = {
              'repos': [{
                  'key': 'common',
                  'label': 'kernel_common_oplus',
                  'remote': 'https://github.com/Corona-oplus-kernel/kernel_common_oplus.git',
                  'commit': os.environ['COMMON_COMMIT'],
              }]
          }

          manager_titles = {
              'resukisu': 'ReSukiSU',
              'sukisu': 'SukiSU',
              'ksunext': 'KSUNext',
              'ksu': 'KernelSU',
              'kowsu': 'KowSU',
              'none': 'No Manager',
          }

          lines = ['## Source Compare', '']

          previous_shared = previous_meta.get('_shared', {})
          previous_shared_repos = {repo['key']: repo for repo in previous_shared.get('repos', [])}
          shared_lines = []
          for repo in shared_meta['repos']:
              rendered = render_repo_line(repo, previous_shared_repos.get(repo['key']))
              if rendered:
                  shared_lines.append(rendered)
          if shared_lines:
              lines.append('### Common')
              lines.extend(shared_lines)
              lines.append('')

          for manager in sorted(current_meta.keys()):
              repos = current_meta[manager].get('repos', [])
              if not repos:
                  continue
              prev_repos = {
                  repo['key']: repo
                  for repo in previous_meta.get(manager, {}).get('repos', [])
              }
              manager_lines = []
              for repo in repos:
                  rendered = render_repo_line(repo, prev_repos.get(repo['key']))
                  if rendered:
                      manager_lines.append(rendered)
              if manager_lines:
                  lines.append(f"### {manager_titles.get(manager, manager)}")
                  lines.extend(manager_lines)
                  lines.append('')

          if lines == ['## Source Compare', '']:
              lines.extend(['- No source changes since the last release.', ''])

          hidden_meta = {'_shared': shared_meta, **current_meta}
          lines.append(f"<!-- source-meta-begin\n{json.dumps(hidden_meta, ensure_ascii=False, separators=(',', ':'))}\nsource-meta-end -->")
          Path('release_body.md').write_text('\n'.join(lines) + '\n')
          PYBODY

      - name: 删除中间源码元数据工件
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });

            for (const artifact of data.artifacts.filter((item) => item.name.startsWith('source-meta-'))) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: 发布 ZIP 包
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: ./release_zips/*.zip
          body_path: ./release_body.md
          generate_release_notes: false
