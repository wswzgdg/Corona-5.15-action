name: 全量构建内核

on:
  workflow_dispatch:
    inputs:
      build_sukisu:
        description: "编译 SukiSU"
        required: true
        type: boolean
        default: true
      build_resukisu:
        description: "编译 ReSukiSU"
        required: true
        type: boolean
        default: true
      build_ksunext:
        description: "编译 KSUNext"
        required: true
        type: boolean
        default: false
      build_ksu:
        description: "编译 KSU"
        required: true
        type: boolean
        default: true
      build_kowsu:
        description: "编译 KowSU"
        required: true
        type: boolean
        default: false
      build_none:
        description: "编译 无管理器"
        required: true
        type: boolean
        default: true
      build_susfs:
        description: "启用 SUSFS"
        required: true
        type: boolean
        default: true
      ccache_update:
        description: "更新 ccache 缓存"
        required: false
        type: boolean
        default: false
      use_kpn:
        description: "使用 KP-N patch 内核镜像"
        required: false
        type: boolean
        default: false
      version_name:
        description: "KSU 版本名主体"
        required: false
        type: string
        default: "eternitylonely"
      clang_version:
        description: "LLVM/Clang 版本"
        required: false
        type: choice
        options:
          - '14'
          - '22'
          - '23'
        default: '23'
      # 这里改的是内核自身的版本后缀，会影响 setlocalversion 生成出来的内核名
      kernel_suffix:
        description: "设置内核后缀"
        required: false
        type: string
        default: ""
      pre_release:
        description: "作为预发布"
        required: false
        type: boolean
        default: false

jobs:
  build:
    permissions:
      actions: write
      contents: read
    strategy:
      # 这里串行跑各个 manager，避免多个大编译任务并发把 runner 资源打满
      max-parallel: 1
      fail-fast: false
      matrix:
        # 逐个把同一套内核源码分别套到不同 manager 变体上构建
        manager: [resukisu, sukisu, ksunext, ksu, kowsu, none]
    uses: ./.github/workflows/kernel-build.yml
    with:
      # 当前矩阵项正在构建哪个 manager，就把它传给复用工作流
      manager: ${{ matrix.manager }}
      # 内核后缀原样传下去，只影响内核名，不影响管理器显示版本
      kernel_suffix: ${{ inputs.kernel_suffix }}
      susfs: ${{ inputs.build_susfs }}
      ccache_update: ${{ inputs.ccache_update }}
      use_kpn: ${{ inputs.use_kpn }}
      version_name: ${{ inputs.version_name }}
      clang_version: ${{ inputs.clang_version }}
      # 这里根据 workflow_dispatch 的勾选结果决定当前矩阵项是否真正执行
      build_enabled: ${{ (matrix.manager == 'sukisu' && inputs.build_sukisu) || (matrix.manager == 'resukisu' && inputs.build_resukisu) || (matrix.manager == 'ksunext' && inputs.build_ksunext) || (matrix.manager == 'ksu' && inputs.build_ksu) || (matrix.manager == 'kowsu' && inputs.build_kowsu) || (matrix.manager == 'none' && inputs.build_none) }}
      allow_fail: true
    secrets: inherit

  release:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 下载全部 ZIP 工件
        uses: actions/download-artifact@v8
        with:
          path: ./release_zips
          pattern: ak3-*
          merge-multiple: true

      - name: 下载 clang 元数据工件
        uses: actions/download-artifact@v8
        with:
          path: ./clang_meta
          pattern: clang-meta-*
          merge-multiple: true

      - name: 检查是否存在 ZIP 产物
        id: release_zips_check
        run: |
          if compgen -G "release_zips/AK3-*.zip" > /dev/null; then
            echo "has_zips=true" >> "$GITHUB_OUTPUT"
          else
            echo "未找到可发布的 ZIP 产物，跳过 release 阶段。"
            echo "has_zips=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 记录成功发包的管理器
        if: ${{ steps.release_zips_check.outputs.has_zips == 'true' }}
        run: |
          # 共享脚本负责汇总成功管理器和 clang 标签，避免把 Python 塞进 YAML。
          python3 .github/workflows/all_managers/release_metadata.py collect-artifacts

      # 读取最近一次稳定版的隐藏元数据，用于生成本次变更对比
      - name: 获取上一版发布元数据
        if: ${{ steps.release_zips_check.outputs.has_zips == 'true' }}
        id: previous_release
        uses: actions/github-script@v8
        with:
          script: |
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 20,
              });
              const stable = releases.find(r => !r.prerelease && !r.draft);
              if (!stable) {
                core.setOutput('body_b64', '');
                return;
              }
              core.setOutput('body_b64', Buffer.from(stable.body || '', 'utf8').toString('base64'));
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('body_b64', '');
                return;
              }
              throw error;
            }

      - name: 生成发布描述
        if: ${{ steps.release_zips_check.outputs.has_zips == 'true' }}
        env:
          PREVIOUS_RELEASE_BODY_B64: ${{ steps.previous_release.outputs.body_b64 }}
          KERNEL_COMMON_TOKEN: ${{ secrets.KERNEL_COMMON_TOKEN }}
          IS_PRERELEASE: ${{ inputs.pre_release }}
          BUILD_RESUKISU: ${{ inputs.build_resukisu }}
          BUILD_SUKISU: ${{ inputs.build_sukisu }}
          BUILD_KSUNEXT: ${{ inputs.build_ksunext }}
          BUILD_KSU: ${{ inputs.build_ksu }}
          BUILD_KOWSU: ${{ inputs.build_kowsu }}
          BUILD_NONE: ${{ inputs.build_none }}
          BUILD_SUSFS: ${{ inputs.build_susfs }}
          BUILD_USE_KPN: ${{ inputs.use_kpn }}
        run: |
          # 共享脚本读取上一版隐藏元数据，并生成当前 release body。
          python3 .github/workflows/all_managers/release_metadata.py generate-release-body

      - name: 发布 ZIP 包
        if: ${{ steps.release_zips_check.outputs.has_zips == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: all-managers-${{ github.run_id }}
          PRERELEASE_FLAG: ${{ inputs.pre_release && '--prerelease' || '' }}
        run: |
          CLANG_LABEL="$(cat ./clang_version_label.txt 2>/dev/null || printf 'unknown')"
          RELEASE_NAME="${{ inputs.pre_release && format('预发布 | 全量构建 #{0} | susfs:{1}', github.run_number, inputs.build_susfs && 'on' || 'off') || format('全量构建 #{0} | susfs:{1}', github.run_number, inputs.build_susfs && 'on' || 'off') }} | clang:${CLANG_LABEL}"
          gh release create "$TAG_NAME" ./release_zips/*.zip \
            --repo "${{ github.repository }}" \
            --title "$RELEASE_NAME" \
            --notes-file ./release_body.md \
            $PRERELEASE_FLAG
