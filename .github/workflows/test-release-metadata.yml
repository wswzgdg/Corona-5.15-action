name: Test Release Metadata

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-kernel-matrix.yml"
      - ".github/workflows/test-release-metadata.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-kernel-matrix.yml"
      - ".github/workflows/test-release-metadata.yml"

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test release metadata script
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import textwrap
          from pathlib import Path

          workflow = Path('.github/workflows/build-kernel-matrix.yml').read_text()
          marker = "python3 - <<'PYBODY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PYBODY", start)
          script = textwrap.dedent(workflow[start:end])

          namespace = {}
          exec(script, namespace)

          original_check_output = subprocess.check_output
          original_env = os.environ.copy()
          try:
              recorded = []

              commit_map = {
                  ('https://github.com/Corona-oplus-kernel/kernel_common_oplus.git', 'android13-5.15-lts'): '0123456789abcdef0123456789abcdef01234567',
                  ('https://github.com/Corona-oplus-kernel/AnyKernel3.git', 'kpm'): '1111111111111111111111111111111111111111',
                  ('https://github.com/Corona-oplus-kernel/AnyKernel3.git', 'main'): '2222222222222222222222222222222222222222',
                  ('https://github.com/ReSukiSU/ReSukiSU.git', 'main'): '3333333333333333333333333333333333333333',
                  ('https://github.com/ShirkNeko/SukiSU-Ultra.git', 'main'): '4444444444444444444444444444444444444444',
              }

              def fake_check_output(command, text=True, env=None, stderr=None, cwd=None):
                  recorded.append({'command': command, 'env': env, 'cwd': cwd})
                  if command[:2] == ['git', 'ls-remote']:
                      remote = command[2]
                      branch = command[3].split('/')[-1]
                      clean_remote = remote.replace('https://secret-token@github.com/', 'https://github.com/')
                      commit = commit_map.get((clean_remote, branch))
                      if not commit:
                          raise subprocess.CalledProcessError(128, command, output='fatal: missing ref')
                      return f'{commit}\trefs/heads/{branch}\n'
                  if command[:2] == ['git', 'init']:
                      return 'Initialized empty Git repository\n'
                  if command[:2] == ['git', 'fetch']:
                      return ''
                  if command[:2] == ['git', 'log']:
                      separator = chr(1)
                      return '\n'.join(
                          f'{index:040x}{separator}commit {index}'
                          for index in range(1, 16)
                      ) + '\n'
                  raise AssertionError(f'unexpected command: {command}')

              subprocess.check_output = fake_check_output

              os.environ['KERNEL_COMMON_TOKEN'] = 'secret-token'
              commit = namespace['ls_remote_commit'](
                  'https://github.com/Corona-oplus-kernel/kernel_common_oplus.git',
                  'android13-5.15-lts',
              )
              assert commit == '0123456789abcdef0123456789abcdef01234567'
              assert recorded[-1]['command'][2] == 'https://secret-token@github.com/Corona-oplus-kernel/kernel_common_oplus.git'
              assert recorded[-1]['env']['GIT_TERMINAL_PROMPT'] == '0'

              calls_before = len(recorded)
              os.environ.pop('KERNEL_COMMON_TOKEN', None)
              commit = namespace['ls_remote_commit'](
                  'https://github.com/Corona-oplus-kernel/kernel_common_oplus.git',
                  'android13-5.15-lts',
              )
              assert commit is None
              assert len(recorded) == calls_before

              os.environ.update({
                  'KERNEL_COMMON_TOKEN': 'secret-token',
                  'BUILD_RESUKISU': 'true',
                  'BUILD_SUKISU': 'false',
                  'BUILD_KSUNEXT': 'false',
                  'BUILD_KSU': 'false',
                  'BUILD_KOWSU': 'false',
                  'BUILD_NONE': 'false',
              })
              previous_meta = {
                  '_shared': {
                      'repos': [{
                          'key': 'common',
                          'label': 'kernel_common_oplus',
                          'remote': 'https://github.com/Corona-oplus-kernel/kernel_common_oplus.git',
                          'branch': 'android13-5.15-lts',
                          'commit': 'abcdef0123456789abcdef0123456789abcdef01',
                      }],
                  },
                  '_ak3': {
                      'repos': [{
                          'key': 'ak3-kpm',
                          'label': 'kpm',
                          'remote': 'https://github.com/Corona-oplus-kernel/AnyKernel3.git',
                          'branch': 'kpm',
                          'commit': 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa',
                      }],
                  },
                  'resukisu': {
                      'repos': [{
                          'key': 'manager',
                          'label': 'ReSukiSU',
                          'remote': 'https://github.com/ReSukiSU/ReSukiSU.git',
                          'branch': 'main',
                          'commit': 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb',
                      }],
                  },
                  'sukisu': {
                      'repos': [{
                          'key': 'manager',
                          'label': 'SukiSU',
                          'remote': 'https://github.com/ShirkNeko/SukiSU-Ultra.git',
                          'branch': 'main',
                          'commit': 'cccccccccccccccccccccccccccccccccccccccc',
                      }],
                  },
              }
              previous_body = 'header\n<!-- source-meta-begin\n' + json.dumps(previous_meta, ensure_ascii=False, separators=(',', ':')) + '\nsource-meta-end -->\n'
              os.environ['PREVIOUS_RELEASE_BODY_B64'] = base64.b64encode(previous_body.encode()).decode()

              output_path = Path('release_body_test.md')
              namespace['generate_release_body'](output_path)
              body = output_path.read_text()

              assert '### 内核' in body
              assert 'abcdef0...0123456' in body
              assert '### 刷机包' in body
              assert '- kpm: [`aaaaaaa...1111111`]' in body
              assert 'main:' not in body
              assert '### 管理器' in body
              assert '- ReSukiSU: [`3333333`]' in body
              assert '- SukiSU:' not in body
              assert 'secret-token' not in body
              assert 'source-meta-begin' in body
              assert '"key":"ak3-kpm"' in body
              assert '"key":"ak3-main"' not in body
          finally:
              subprocess.check_output = original_check_output
              os.environ.clear()
              os.environ.update(original_env)
          PY
