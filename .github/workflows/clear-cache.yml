name: Clear Actions Cache

on:
  workflow_dispatch:
    inputs:
      cache_type:
        description: '要清理的缓存类型'
        required: true
        type: choice
        default: 'ccache'
        options:
          - 'ccache'
          - 'repo'
          - 'clang22'
          - 'custom'
      ref_name:
        description: '分支名；用于 ccache/repo 前缀拼接'
        required: false
        type: string
        default: 'main'
      prefix:
        description: '自定义缓存前缀；仅在 cache_type=custom 时使用'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Only list matching caches, do not delete'
        required: true
        type: boolean
        default: true

permissions:
  actions: write
  contents: read

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Delete caches by prefix
        env:
          GH_TOKEN: ${{ github.token }}
          CACHE_TYPE: ${{ inputs.cache_type }}
          REF_NAME: ${{ inputs.ref_name }}
          CUSTOM_PREFIX: ${{ inputs.prefix }}
          RUNNER_OS: ${{ runner.os }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          case "${CACHE_TYPE}" in
            ccache)
              PREFIX="ccache-5.15-${RUNNER_OS}-${REF_NAME}"
              ;;
            repo)
              PREFIX="repo-${RUNNER_OS}-${REF_NAME}"
              ;;
            clang22)
              PREFIX="clang22-llvm-22.1.0-${RUNNER_OS}"
              ;;
            custom)
              PREFIX="${CUSTOM_PREFIX}"
              ;;
            *)
              echo "未知的 cache_type: ${CACHE_TYPE}"
              exit 1
              ;;
          esac

          if [ -z "${PREFIX}" ]; then
            echo "prefix 不能为空"
            exit 1
          fi

          echo "缓存类型: ${CACHE_TYPE}"
          echo "查找缓存前缀: ${PREFIX}"
          ids=$(gh api --paginate -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/caches \
            -q '.actions_caches[] | select(.key | startswith(env.PREFIX)) | .id')

          if [ -z "${ids}" ]; then
            echo "未找到匹配缓存"
            exit 0
          fi

          echo "匹配的缓存 ID:"
          echo "${ids}"

          if [ "${DRY_RUN}" = "true" ]; then
            echo "dry_run=true，未执行删除"
            exit 0
          fi

          for id in ${ids}; do
            echo "删除缓存 ID: ${id}"
            gh api --method DELETE -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/actions/caches/${id}
          done
